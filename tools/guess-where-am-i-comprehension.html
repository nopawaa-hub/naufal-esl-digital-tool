<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Where Am I?</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Canvas Confetti for game rewards -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data Models
        const ROOMS = [
            { id: 'bedroom', name: 'Bedroom', emoji: '🛏️', color: 'bg-indigo-200 border-indigo-400' },
            { id: 'bathroom', name: 'Bathroom', emoji: '🛁', color: 'bg-cyan-200 border-cyan-400' },
            { id: 'kitchen', name: 'Kitchen', emoji: '🍳', color: 'bg-orange-200 border-orange-400' },
            { id: 'living', name: 'Living Room', emoji: '🛋️', color: 'bg-green-200 border-green-400' },
            { id: 'dining', name: 'Dining Room', emoji: '🍽️', color: 'bg-yellow-200 border-yellow-400' },
        ];

        const ROUTINES = [
            { id: 'r1', name: 'brushing teeth', room: 'bathroom', emoji: '🪥' },
            { id: 'r2', name: 'cooking', room: 'kitchen', emoji: '👩‍🍳' },
            { id: 'r3', name: 'sleeping', room: 'bedroom', emoji: '💤' },
            { id: 'r4', name: 'watching TV', room: 'living', emoji: '📺' },
            { id: 'r5', name: 'eating', room: 'dining', emoji: '🥪' },
        ];

        const QUESTIONS = [
            { q: "I am brushing my teeth.", a: "bathroom" },
            { q: "My sister is watching TV.", a: "living" },
            { q: "I am sleeping.", a: "bedroom" },
            { q: "We are eating dinner.", a: "dining" },
            { q: "Mother is cooking.", a: "kitchen" }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('menu');

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="text-center mb-8 bg-white p-6 rounded-3xl shadow-lg border-4 border-blue-400">
                        <h1 className="text-4xl md:text-5xl font-bold text-blue-600 mb-2">🏠 Guess Where Am I? 🕵️‍♂️</h1>
                        <p className="text-xl text-gray-600">Year 4 ESL Interactive Game</p>
                    </header>

                    {/* Navigation/Menu */}
                    {activeTab === 'menu' && (
                        <div className="grid md:grid-cols-2 gap-6 mt-4 flex-grow">
                            <button 
                                onClick={() => setActiveTab('matching')}
                                className="bg-white hover:bg-blue-50 p-8 rounded-3xl shadow-xl border-4 border-pink-400 transition transform hover:-translate-y-2 flex flex-col items-center justify-center gap-4 group"
                            >
                                <span className="text-7xl group-hover:scale-110 transition">🧩</span>
                                <h2 className="text-3xl font-bold text-pink-600">Section A: Matching</h2>
                                <p className="text-gray-500 text-lg">Match the routines to the correct rooms!</p>
                            </button>

                            <button 
                                onClick={() => setActiveTab('guessing')}
                                className="bg-white hover:bg-blue-50 p-8 rounded-3xl shadow-xl border-4 border-purple-400 transition transform hover:-translate-y-2 flex flex-col items-center justify-center gap-4 group"
                            >
                                <span className="text-7xl group-hover:scale-110 transition">🤔</span>
                                <h2 className="text-3xl font-bold text-purple-600">Section B: Guessing</h2>
                                <p className="text-gray-500 text-lg">Read the sentence and guess the room!</p>
                            </button>
                        </div>
                    )}

                    {/* Game Sections */}
                    {activeTab === 'matching' && <MatchingGame onBack={() => setActiveTab('menu')} />}
                    {activeTab === 'guessing' && <GuessingGame onBack={() => setActiveTab('menu')} />}
                </div>
            );
        }

        // --- SECTION A: MATCHING GAME ---
        function MatchingGame({ onBack }) {
            const [selectedRoutine, setSelectedRoutine] = useState(null);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [errorRoom, setErrorRoom] = useState(null);

            const handleRoutineClick = (routine) => {
                if (!matchedPairs.includes(routine.id)) {
                    setSelectedRoutine(routine);
                    setErrorRoom(null);
                }
            };

            const handleRoomClick = (roomId) => {
                if (!selectedRoutine) return;

                if (selectedRoutine.room === roomId) {
                    // Correct match
                    setMatchedPairs([...matchedPairs, selectedRoutine.id]);
                    setSelectedRoutine(null);
                    confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
                } else {
                    // Wrong match
                    setErrorRoom(roomId);
                    setTimeout(() => setErrorRoom(null), 500);
                }
            };

            const isGameComplete = matchedPairs.length === ROUTINES.length;

            return (
                <div className="bg-white p-6 rounded-3xl shadow-lg border-4 border-pink-400 pop-in flex-grow flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold text-pink-600 flex items-center gap-2">
                            <span>🧩</span> Section A: Matching
                        </h2>
                        <button onClick={onBack} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold">
                            ← Back to Menu
                        </button>
                    </div>

                    {!isGameComplete ? (
                        <>
                            <p className="text-xl text-center mb-8 bg-pink-50 p-4 rounded-xl border border-pink-200">
                                <strong>How to play:</strong> Click a routine on the right, then click the correct room on the left!
                            </p>

                            <div className="flex flex-col md:flex-row gap-8 flex-grow">
                                {/* Rooms Column */}
                                <div className="flex-1 flex flex-col gap-4">
                                    <h3 className="text-2xl font-bold text-center text-gray-600 mb-2">Rooms</h3>
                                    {ROOMS.map(room => (
                                        <button 
                                            key={room.id}
                                            onClick={() => handleRoomClick(room.id)}
                                            className={`p-4 rounded-2xl border-4 text-left flex items-center gap-4 transition transform hover:scale-[1.02] active:scale-95
                                                ${room.color} 
                                                ${errorRoom === room.id ? 'shake border-red-500 bg-red-100' : ''}
                                                ${selectedRoutine ? 'cursor-pointer hover:shadow-lg' : 'cursor-default opacity-90'}
                                            `}
                                        >
                                            <span className="text-4xl bg-white p-2 rounded-xl shadow-sm">{room.emoji}</span>
                                            <span className="text-2xl font-bold text-gray-800">{room.name}</span>
                                        </button>
                                    ))}
                                </div>

                                {/* Divider */}
                                <div className="hidden md:flex items-center justify-center">
                                    <div className="w-2 h-full bg-pink-100 rounded-full"></div>
                                </div>

                                {/* Routines Column */}
                                <div className="flex-1 flex flex-col gap-4">
                                    <h3 className="text-2xl font-bold text-center text-gray-600 mb-2">Routines</h3>
                                    {ROUTINES.map(routine => {
                                        const isMatched = matchedPairs.includes(routine.id);
                                        const isSelected = selectedRoutine?.id === routine.id;
                                        
                                        return (
                                            <button 
                                                key={routine.id}
                                                onClick={() => handleRoutineClick(routine)}
                                                disabled={isMatched}
                                                className={`p-4 rounded-2xl border-4 text-left flex items-center gap-4 transition
                                                    ${isMatched ? 'bg-gray-100 border-gray-300 opacity-50 cursor-not-allowed' : 'bg-white border-pink-300 hover:bg-pink-50 cursor-pointer'}
                                                    ${isSelected ? 'border-pink-500 bg-pink-100 shadow-md transform scale-[1.02]' : ''}
                                                `}
                                            >
                                                <span className="text-4xl bg-pink-50 p-2 rounded-xl">{routine.emoji}</span>
                                                <span className={`text-2xl font-bold ${isMatched ? 'text-gray-400 line-through' : 'text-gray-800'}`}>
                                                    {routine.name}
                                                </span>
                                                {isMatched && <span className="ml-auto text-3xl">✅</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </>
                    ) : (
                        <div className="flex flex-col items-center justify-center flex-grow text-center space-y-6">
                            <div className="text-8xl">🎉</div>
                            <h2 className="text-5xl font-bold text-green-500">Fantastic Job!</h2>
                            <p className="text-2xl text-gray-600">You matched all the routines perfectly!</p>
                            <button 
                                onClick={() => { setMatchedPairs([]); setSelectedRoutine(null); }}
                                className="mt-8 bg-pink-500 hover:bg-pink-600 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105"
                            >
                                Play Again 🔄
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // --- SECTION B: GUESSING GAME ---
        function GuessingGame({ onBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showFeedback, setShowFeedback] = useState(null); // 'correct' | 'wrong'
            const [gameComplete, setGameComplete] = useState(false);

            const currentQ = QUESTIONS[currentIndex];

            const handleGuess = (roomId) => {
                if (showFeedback) return; // Prevent clicking while showing feedback

                if (roomId === currentQ.a) {
                    setShowFeedback('correct');
                    setScore(score + 1);
                    confetti({ particleCount: 30, spread: 50, origin: { y: 0.7 } });
                } else {
                    setShowFeedback('wrong');
                }

                setTimeout(() => {
                    setShowFeedback(null);
                    if (currentIndex < QUESTIONS.length - 1) {
                        setCurrentIndex(currentIndex + 1);
                    } else {
                        setGameComplete(true);
                        confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 } });
                    }
                }, 1500);
            };

            const resetGame = () => {
                setCurrentIndex(0);
                setScore(0);
                setGameComplete(false);
            };

            return (
                <div className="bg-white p-6 rounded-3xl shadow-lg border-4 border-purple-400 pop-in flex-grow flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold text-purple-600 flex items-center gap-2">
                            <span>🤔</span> Section B: Guess Where Am I?
                        </h2>
                        <button onClick={onBack} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold">
                            ← Back to Menu
                        </button>
                    </div>

                    {/* Roleplay Dialogue Example */}
                    <div className="bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 mb-8 flex flex-col md:flex-row gap-4 items-center justify-center">
                        <div className="bg-white p-3 rounded-xl shadow-sm flex items-center gap-2">
                            <span className="text-2xl">👦</span>
                            <span className="text-lg font-bold text-blue-800">A: What can I do in the kitchen?</span>
                        </div>
                        <span className="text-2xl text-blue-300 hidden md:inline">→</span>
                        <div className="bg-white p-3 rounded-xl shadow-sm flex items-center gap-2">
                            <span className="text-2xl">👧</span>
                            <span className="text-lg font-bold text-green-800">B: You can cook chicken soup!</span>
                        </div>
                    </div>

                    {!gameComplete ? (
                        <div className="flex-grow flex flex-col items-center justify-center max-w-2xl mx-auto w-full">
                            
                            <div className="w-full flex justify-between text-lg font-bold text-gray-500 mb-4">
                                <span>Question {currentIndex + 1} of {QUESTIONS.length}</span>
                                <span>Score: {score} ⭐</span>
                            </div>

                            {/* Question Card */}
                            <div className="w-full bg-purple-50 border-4 border-purple-200 rounded-3xl p-8 mb-8 text-center relative">
                                <h3 className="text-3xl md:text-4xl font-bold text-purple-800">
                                    "{currentQ.q}"
                                </h3>
                                
                                {/* Feedback Overlay */}
                                {showFeedback === 'correct' && (
                                    <div className="absolute inset-0 bg-green-100 rounded-3xl flex items-center justify-center pop-in">
                                        <span className="text-6xl font-bold text-green-600">✅ Correct!</span>
                                    </div>
                                )}
                                {showFeedback === 'wrong' && (
                                    <div className="absolute inset-0 bg-red-100 rounded-3xl flex items-center justify-center pop-in">
                                        <span className="text-6xl font-bold text-red-600">❌ Oops!</span>
                                    </div>
                                )}
                            </div>

                            {/* Answer Grid */}
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 w-full">
                                {ROOMS.map(room => (
                                    <button
                                        key={room.id}
                                        onClick={() => handleGuess(room.id)}
                                        className={`p-4 rounded-2xl border-4 flex flex-col items-center justify-center gap-2 transition transform hover:scale-105 active:scale-95
                                            ${room.color} hover:shadow-lg bg-opacity-50
                                        `}
                                    >
                                        <span className="text-5xl bg-white p-3 rounded-full shadow-sm">{room.emoji}</span>
                                        <span className="text-xl font-bold text-gray-800 text-center">{room.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col items-center justify-center flex-grow text-center space-y-6">
                            <div className="text-8xl">🏆</div>
                            <h2 className="text-5xl font-bold text-purple-600">Game Over!</h2>
                            <p className="text-3xl text-gray-700">You scored <strong className="text-yellow-500">{score}</strong> out of {QUESTIONS.length}!</p>
                            
                            <button 
                                onClick={resetGame}
                                className="mt-8 bg-purple-500 hover:bg-purple-600 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105"
                            >
                                Play Again 🔄
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
